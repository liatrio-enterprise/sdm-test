name: CI - Tests and Linting

on:
  # Avoid duplicate runs: run on PRs for branches, and on direct pushes to main
  # Ignore changes to CHANGELOG.md (auto-generated by semantic-release)
  push:
    branches: ["main"]
    paths-ignore:
      - "CHANGELOG.md"
  pull_request:
    paths-ignore:
      - "CHANGELOG.md"
  workflow_dispatch:

jobs:
  lint:
    name: Run Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Show files modified by pre-commit hooks
        if: failure()
        run: |
          echo "::group::Files modified by pre-commit hooks"
          git diff --name-only
          echo "::endgroup::"
          echo ""
          echo "::group::Full diff of modifications"
          git diff
          echo "::endgroup::"
